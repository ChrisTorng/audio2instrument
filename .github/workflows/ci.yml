name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install project and test dependencies
        run: |
          python -m pip install --disable-pip-version-check --quiet --upgrade pip
          python -m pip install --disable-pip-version-check --quiet -e ".[dev]"

      - name: Ruff diagnostics
        id: ruff
        continue-on-error: true
        run: |
          set -o pipefail
          python -m ruff check src tests --output-format=concise 2>&1 | tee ruff.txt

      - name: Pytest diagnostics
        id: pytest
        continue-on-error: true
        run: |
          set -o pipefail
          python -m pytest 2>&1 | tee pytest.txt

      - name: Upload CI diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-diagnostics
          path: |
            ruff.txt
            pytest.txt

      - name: Enforce CI result
        if: steps.ruff.outcome == 'failure' || steps.pytest.outcome == 'failure'
        run: exit 1
